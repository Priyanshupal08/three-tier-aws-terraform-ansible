---
- name: Configure Apache Web Server
  hosts: web
  become: yes

  tasks:

    - name: Install Apache
      dnf:
        name: httpd
        state: present

    - name: Enable Apache
      service:
        name: httpd
        enabled: yes

    - name: Start Apache
      service:
        name: httpd
        state: started

    - name: Deploy Website
      copy:
        src: ../app/index.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0644'